{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">Invoice Details: {{ invoice.invoice_number }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label>Invoice Number</label>
                            <input type="text" name="invoice_number" class="form-control" value="{{ invoice.invoice_number }}">
                        </div>
                        <div class="form-group">
                            <label>Vendor Name</label>
                            <input type="text" name="vendor_name" class="form-control" value="{{ invoice.vendor_name }}">
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" name="date" class="form-control" value="{{ invoice.date|date:'Y-m-d' }}">
                        </div>
                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" step="0.01" name="amount" class="form-control" value="{{ invoice.amount }}">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>
                    </form>
                    
                    <hr>
                    
                    <h5>Extracted OCR Text</h5>
                    <div class="border p-3 bg-light" style="max-height: 300px; overflow-y: auto;">
                        <pre>{{ invoice.extracted_text|truncatechars:1000 }}</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
